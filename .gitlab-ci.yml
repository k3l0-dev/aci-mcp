stages:
  - lint

# ── Lint ───────────────────────────────────────────────────────────────────────

lint:collector:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install uv --quiet
    - uvx ruff check schema-collector/collect.py
    - uvx ruff format --check schema-collector/collect.py
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
