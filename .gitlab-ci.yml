stages:
  - lint
  - test
  - security
  - build

# ── Lint ─────────────────────────────────────────────────────────────────────

ruff:
  stage: lint
  image: python:3.12-slim
  cache:
    key: uv-$CI_COMMIT_REF_SLUG
    paths:
      - .uv-cache/
  variables:
    UV_CACHE_DIR: $CI_PROJECT_DIR/.uv-cache
  before_script:
    - pip install uv --quiet
  script:
    - cd mcp          && uv sync --frozen --dev && uv run --frozen ruff check .
    - cd ../schema-collector && uv sync --frozen --dev && uv run --frozen ruff check .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ── Tests ─────────────────────────────────────────────────────────────────────

pytest:
  stage: test
  image: python:3.12-slim
  cache:
    key: uv-$CI_COMMIT_REF_SLUG
    paths:
      - .uv-cache/
  variables:
    UV_CACHE_DIR: $CI_PROJECT_DIR/.uv-cache
  before_script:
    - pip install uv --quiet
  script:
    - cd mcp && uv sync --frozen --dev && uv run --frozen pytest tests/unit/ tests/integration/ -q
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ── Security ──────────────────────────────────────────────────────────────────

gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --config .gitleaks.toml --verbose
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

audit:
  stage: security
  image: python:3.12-slim
  before_script:
    - pip install uv --quiet
  script:
    - cd mcp          && uv export --frozen --no-dev > /tmp/mcp-req.txt
                       && uvx pip-audit -r /tmp/mcp-req.txt
    - cd ../schema-collector && uv export --frozen --no-dev > /tmp/sc-req.txt
                              && uvx pip-audit -r /tmp/sc-req.txt
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ── Build ─────────────────────────────────────────────────────────────────────

docker-build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -f mcp/deploy/Dockerfile . -t aci-mcp:ci
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
