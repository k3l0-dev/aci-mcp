stages:
  - lint
  - build

# ── Lint ───────────────────────────────────────────────────────────────────────

lint:collector:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install uv --quiet
    - uvx ruff check schema-collector/collect.py
    - uvx ruff format --check schema-collector/collect.py
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── Build ──────────────────────────────────────────────────────────────────────

build:collector:
  stage: build
  image: python:3.12-bookworm
  script:
    - bash schema-collector/deploy/build.sh
  artifacts:
    name: "aci-collect_${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}_linux-x86_64"
    paths:
      - schema-collector/dist/aci-collect
    expire_in: 90 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'
